name: Fetch Search Console Data

on:
  schedule:
    - cron: '50 23 * * 0'  # 月曜 8:50 JST = 日曜 23:50 UTC
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Write credentials
        run: |
          echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Fetch Search Console data
        run: node fetch-data.mjs

      - name: Update token if refreshed
        run: |
          if [ -f token.json ]; then
            gh secret set GOOGLE_TOKEN < token.json
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || (git commit -m "chore: weekly Search Console report $(date +%Y-%m-%d)" && git push)
