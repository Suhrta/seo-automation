name: Fetch Search Console Data & Update Dashboard

on:
  schedule:
    - cron: '50 23 * * 0'  # 月曜 8:50 JST = 日曜 23:50 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Write credentials
        run: |
          echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Fetch Search Console data
        run: node fetch-data.mjs

      - name: Update token if refreshed
        continue-on-error: true
        run: |
          if [ -f token.json ]; then
            gh secret set GOOGLE_TOKEN < token.json
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dashboard
        run: node generate-dashboard.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          git diff --staged --quiet || (git commit -m "chore: weekly report + dashboard $(date +%Y-%m-%d)" && git push)

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
